<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday.com App</title>
</head>
<body>
    <div id="app" class="App">
        <p>Loading...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monday-sdk-js/dist/main.js"></script>

    <script>
        const monday = mondaySdk();
        const appContainer = document.getElementById('app');
        let boards = [];  // This will store the fetched boards

        monday.listen("context", async (res) => {
            const context = res.data;

            // Fetch all users (including the current user)
            const userInfo = await fetchUsers();

            // Get the current user from the users list (matching user.id from context)
            const currentUser = userInfo.find(user => user.id === context.user.id);

            // Set user information in the app
            const userContent = `
                <div class="attention-box">
                    <h1>Welcome to Monday Apps!</h1>
                    <p>Your name: ${currentUser?.name || 'Name not available'}, User ID: ${context.user.id}</p>
                </div>
            `;
            appContainer.innerHTML = userContent;

            // Fetch user's boards
            await fetchBoards();
        });

        const fetchUsers = async () => {
            try {
                const response = await monday.api(`query {
                    users {
                        id
                        name
                    }
                }`);
                return response.data.users;
            } catch (error) {
                console.error("Error fetching user details:", error);
                return [];
            }
        };

        const fetchBoards = async () => {
            try {
                const response = await monday.api(`query {
                    boards {
                        id
                        name
                    }
                }`);
                boards = response.data.boards; // Store boards globally

                const boardsList = `
                    <div class="board-list">
                        <h2>Your Boards:</h2>
                        <ul>
                            ${boards.map(board => 
                                `<li data-id="${board.id}" class="board-item">${board.name}</li>`
                            ).join('')}
                        </ul>
                    </div>
                `;
                appContainer.innerHTML += boardsList; // Append boards to the container

                // Add click event listeners to each board item
                document.querySelectorAll('.board-item').forEach(item => {
                    item.addEventListener('click', (event) => {
                        const boardId = event.target.getAttribute('data-id');
                        fetchBoardData(boardId); // Fetch and show board data when clicked
                    });
                });
            } catch (error) {
                console.error("Error fetching boards:", error);
                appContainer.innerHTML += `<p>Error fetching boards. Please try again later.</p>`;
            }
        };

        const fetchBoardData = async (boardId) => {
            try {
                const response = await monday.api(`query {
                    boards(ids: ${boardId}) {
                        name
                        items {
                            id
                            name
                            column_values {
                                id
                                text
                            }
                        }
                    }
                }`);
                
                const boardData = response.data.boards[0];

                const boardDetails = `
                    <div class="board-details">
                        <h2>${boardData.name}</h2>
                        <ul>
                            ${boardData.items.map(item => `
                                <li>
                                    <strong>${item.name}</strong>
                                    <ul>
                                        ${item.column_values.map(column => 
                                            `<li>${column.id}: ${column.text}</li>`
                                        ).join('')}
                                    </ul>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                appContainer.innerHTML = boardDetails;  // Replace the current content with board details
            } catch (error) {
                console.error("Error fetching board data:", error);
                appContainer.innerHTML += `<p>Error fetching board data. Please try again later.</p>`;
            }
        };
    </script>
    <style>
        /* Optional: Basic styling */
        .App {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .attention-box, .board-list, .board-details {
            background-color: #e0f7fa;
            border: 1px solid #4db6ac;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 20px;
        }

        ul {
            list-style-type: none;
            padding-left: 0;
        }

        .board-item {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }

        .board-item:hover {
            color: darkblue;
        }
    </style>
</body>
</html>
