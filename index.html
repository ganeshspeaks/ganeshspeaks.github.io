<!DOCTYPE html>
<html lang="en">
    <head>
        <style>


            * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            }

            body {
            font-family: cursive;
            }

            a {
            text-decoration: none;
            }

            li {
            list-style: none;
            }

            /* NAVBAR STYLING STARTS */
            .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background-color: white;
            color: #004080;
            border-bottom: #004080 solid 2px;
            }

            .nav-links a {
            color: #004080;
            }

            /* LOGO */
            .logo {
            font-size: 28px;
            }

            /* NAVBAR MENU */
            .menu {
            display: flex;
            gap: 1em;
            font-size: 18px;
            }

            .menu li:hover {
            border-radius: 5px;
            transition: 0.3s ease;
            background-color: orange;
            }

            .menu li {
            padding: 5px 14px;
            }

            /* DROPDOWN MENU */
            .services {
            position: relative; 
            }

            .dropdown {
            background-color: rgb(1, 139, 139);
            padding: 1em 0;
            position: absolute; /*WITH RESPECT TO PARENT*/
            display: none;
            border-radius: 8px;
            top: 40px;
            }

            .dropdown li + li {
            margin-top: 10px;
            }

            .dropdown li {
            padding: 0.5em 1em;
            width: 8em;
            text-align: center;
            }

            .dropdown li:hover {
            background-color: #4c9e9e;
            }

            .services:hover .dropdown {
            display: block;
            }

            /* CHECKBOX HACK */

            input[type=checkbox] {
            display: none;
            } 

            /* HAMBURGER MENU */
            .hamburger {
            display: none;
            font-size: 24px;
            user-select: none;
            }

            /* APPLYING MEDIA QUERIES */
            @media (max-width: 768px) {
            .menu {
                display:none;
                position: absolute;
                right: 0;
                left: 0;
                text-align: center;
                padding: 16px 0;
                color:#004080;
                border-bottom: 1px solid #004080;
                background-color: yellow;
            }

            .menu li:hover {
                display: inline-block;
                color: orange;
                transition: 0.3s ease;
            }

            .menu li + li {
                margin-top: 12px;
            }

            input[type=checkbox]:checked ~ .menu {
                display: block;
            }

            .hamburger {
                display: block;
            }

            .dropdown {
                left: 50%;
                top: 30px;
                transform: translateX(35%);
            }

            .dropdown li:hover {
                background-color: #4c9e9e;
            }
            }


            /* web content */

            #home{
                background-color: #FFD700;
                text-align: center;
                padding: 40px;
                padding-top: 80px;
                padding-bottom: 80px;
                
            }

        </style>
    </head>
    <body>
        <nav class="navbar">
            <!-- LOGO -->
            <div class="logo">Ganesh Speaks</div>
        
            <!-- NAVIGATION MENU -->
            <ul class="nav-links">
        
              <!-- USING CHECKBOX HACK -->
              <input type="checkbox" id="checkbox_toggle" />
              <label for="checkbox_toggle" class="hamburger">&#9776;</label>
        
              <!-- NAVIGATION MENUS -->
              <div class="menu">
        
                <li><a href="/">Home</a></li>
                <li><a href="/">About</a></li>
              
                <!-- DROPDOWN MENU 
                <li class="services">
                  <a href="/">Services</a>
        
                  
                  <ul class="dropdown">
                    <li><a href="/">Dropdown 1 </a></li>
                    <li><a href="/">Dropdown 2</a></li>
                    <li><a href="/">Dropdown 2</a></li>
                    <li><a href="/">Dropdown 3</a></li>
                    <li><a href="/">Dropdown 4</a></li>
                  </ul>
        
                </li>

                -->
        
                <li><a href="/">Skills</a></li>
                <li><a href="/">Contact</a></li>
              </div>
            </ul>
        </nav>

        <div id="home">
            <div>
                <h1>
                    Ganesh Speaks
                </h1>
                <p>Every experience, no matter how small, shapes my lens on the world.</p>
            </div>
        </div>


    </body>
</html>
